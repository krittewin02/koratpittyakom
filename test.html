<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRT PIT - Mobile & Desktop</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans Thai', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0f172a; background-image: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); color: #f8fafc; min-height: 100vh; }
        .gold-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .glass-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(245, 158, 11, 0.2); backdrop-filter: blur(10px); }
        .nav-active { background: #f59e0b !important; color: #0f172a !important; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-confirm { background: #f59e0b; color: #000; font-weight: 800; box-shadow: 0 4px 0 #b45309; transition: all 0.1s; }
        .btn-confirm:active { transform: translateY(2px); box-shadow: 0 2px 0 #b45309; }
        
        /* ซ่อน Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden">

    <aside class="hidden md:flex w-64 bg-slate-900 border-r border-amber-500/20 flex-col p-6">
        <div class="mb-10 text-center">
            <div class="w-16 h-16 gold-gradient rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-xl">
                <i data-lucide="school" class="text-slate-900 w-8 h-8"></i>
            </div>
            <h1 class="text-lg font-black text-amber-500 tracking-tight">KORAT PIT</h1>
        </div>
        <nav class="flex-1 space-y-2">
            <button onclick="showPage('checkin')" id="btn-nav-checkin-pc" class="nav-active w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all">
                <i data-lucide="user-check"></i> ลงเวลาปฏิบัติงาน
            </button>
            <button onclick="checkAdmin()" id="btn-nav-admin-pc" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-400 hover:bg-white/5 transition-all">
                <i data-lucide="settings"></i> จัดการบุคลากร
            </button>
        </nav>
        <button id="logout-btn-pc" onclick="adminLogout()" class="hidden w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-rose-400 bg-rose-400/10 mt-4">
            <i data-lucide="log-out"></i> ออกจากระบบ
        </button>
    </aside>

    <main class="flex-1 flex flex-col p-4 md:p-8 overflow-y-auto pb-24 md:pb-8">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4 border-b border-amber-500/20 pb-6">
            <div>
                <h2 id="page-title" class="text-2xl md:text-3xl font-black text-white">ลงเวลาปฏิบัติราชการ</h2>
                <p id="live-date" class="text-amber-500 text-sm md:text-base font-medium"></p>
            </div>
            <div class="text-left md:text-right">
                <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">เวลาปัจจุบัน</p>
                <p id="live-time" class="text-3xl md:text-4xl font-black text-white leading-none">00:00:00</p>
            </div>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
            <div class="glass-card p-3 md:p-4 rounded-xl border-l-4 border-l-blue-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase">บุคลากร</p>
                <p id="stat-total" class="text-2xl font-black text-white">0</p>
            </div>
            <div class="glass-card p-3 md:p-4 rounded-xl border-l-4 border-l-emerald-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase">มาแล้ว</p>
                <p id="stat-present" class="text-2xl font-black text-emerald-500">0</p>
            </div>
            <div class="glass-card p-3 md:p-4 rounded-xl border-l-4 border-l-amber-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase">สาย</p>
                <p id="stat-late" class="text-2xl font-black text-amber-500">0</p>
            </div>
            <div class="glass-card p-3 md:p-4 rounded-xl border-l-4 border-l-rose-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase">ยังไม่มา</p>
                <p id="stat-absent" class="text-2xl font-black text-rose-500">0</p>
            </div>
        </div>

        <div id="page-checkin" class="page active space-y-6">
            <div class="flex flex-col lg:flex-row gap-6">
                <div class="flex-1 glass-card p-6 md:p-8 rounded-[24px] md:rounded-[32px] shadow-2xl">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-amber-500 uppercase">เลือกชื่อ</label>
                            <select id="staff-select" class="w-full h-14 bg-slate-800 border-2 border-amber-500/30 rounded-xl px-4 text-base font-bold text-white outline-none focus:border-amber-500"></select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-amber-500 uppercase">ประเภท</label>
                            <select id="checkin-type" class="w-full h-14 bg-slate-800 border-2 border-amber-500/30 rounded-xl px-4 text-base font-bold text-white outline-none focus:border-amber-500">
                                <option value="in">🕒 เข้างาน</option>
                                <option value="out">🏠 กลับบ้าน</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="handleCheckIn()" class="btn-confirm w-full h-16 rounded-xl text-lg flex items-center justify-center gap-3">
                        <i data-lucide="save"></i> บันทึกข้อมูล
                    </button>
                </div>

                <div class="lg:w-72 glass-card p-6 rounded-[24px] flex flex-col items-center justify-center">
                    <h3 class="text-xs font-bold text-amber-500 mb-4 uppercase">สัดส่วนวันนี้</h3>
                    <div style="width: 140px; height: 140px;">
                        <canvas id="attendanceChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-[24px] overflow-hidden">
                <div class="p-4 bg-white/5 font-bold text-amber-500 text-sm">ประวัติวันนี้</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[500px]">
                        <thead class="bg-slate-900/50 text-[10px] font-bold text-slate-400 uppercase">
                            <tr>
                                <th class="p-4">รหัส/ชื่อ</th>
                                <th class="p-4">เข้า</th>
                                <th class="p-4">กลับ</th>
                                <th class="p-4 text-center">สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="attendance-list" class="divide-y divide-white/5 text-sm font-medium"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="page-admin" class="page space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass-card p-6 rounded-[24px] space-y-4">
                    <h3 class="text-emerald-400 font-bold flex items-center gap-2"><i data-lucide="user-plus"></i> เพิ่มรายชื่อ</h3>
                    <input type="text" id="new-id" class="w-full h-12 bg-slate-900 border border-white/10 rounded-xl px-4 text-white text-sm" placeholder="รหัส">
                    <input type="text" id="new-name" class="w-full h-12 bg-slate-900 border border-white/10 rounded-xl px-4 text-white text-sm" placeholder="ชื่อ-นามสกุล">
                    <button onclick="addStaff()" class="w-full py-3 bg-emerald-600 rounded-xl font-bold text-white">เพิ่มรายชื่อ</button>
                </div>
                <div class="glass-card rounded-[24px] overflow-hidden">
                    <div class="p-4 border-b border-white/5 font-bold text-sm">จัดการรายชื่อ</div>
                    <div class="max-h-[300px] overflow-auto">
                        <table class="w-full text-left text-sm">
                            <tbody id="manage-staff-list" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="exportToExcel()" class="py-4 bg-blue-600 rounded-xl font-bold text-xs">Excel Report</button>
                <button onclick="clearHistory()" class="py-4 bg-rose-900/30 border border-rose-500/50 text-rose-400 rounded-xl font-bold text-xs">ล้างประวัติ</button>
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-amber-500/30 flex justify-around p-3 z-40 backdrop-blur-md">
        <button onclick="showPage('checkin')" id="btn-nav-checkin-mob" class="flex flex-col items-center gap-1 text-amber-500">
            <i data-lucide="user-check" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold">ลงเวลา</span>
        </button>
        <button onclick="checkAdmin()" id="btn-nav-admin-mob" class="flex flex-col items-center gap-1 text-slate-400">
            <i data-lucide="settings" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold">จัดการ</span>
        </button>
    </nav>

    <div id="login-modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl hidden z-[100] items-center justify-center p-6">
        <div class="glass-card p-8 w-full max-w-xs rounded-[32px] text-center border-amber-500">
            <h3 class="text-xl font-black text-white mb-6">ADMIN LOGIN</h3>
            <input type="password" id="admin-pass" class="w-full h-14 rounded-xl text-center text-2xl mb-6 bg-slate-900 border-2 border-amber-500 text-white" placeholder="••••">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 h-12 rounded-xl bg-white/10 text-white font-bold text-sm">ยกเลิก</button>
                <button onclick="tryLogin()" class="flex-1 h-12 rounded-xl gold-gradient text-slate-900 font-bold text-sm">ตกลง</button>
            </div>
        </div>
    </div>

    <script>
        // ระบบจัดการข้อมูล (เหมือนเดิมแต่ปรับปรุง UI Rendering)
        const DEFAULT_STAFF = [
            {id:'K01',name:'นางมัสธุรส ผ่องสุข'},{id:'K02',name:'นางปวีณา จันทร์คำวงษ์'},{id:'K03',name:'นางสาวศศิวิมล เกิดหมื่นไวย'},
            {id:'K06',name:'นางสาววรารัตน์ เลิศแก้ว'},{id:'K07',name:'นางสุภาพร พรพิมานแมน'},{id:'K08',name:'นางสาวจันจิรา รักษาราช'},
            {id:'K11',name:'นายกิติพงศ์ เพ็งวิสาภาพพงษ์'},{id:'K12',name:'นางจันฑิมา ทองภูบาล'},{id:'K13',name:'นางศิริวรรณ ไม้พรต'},
            {id:'K14',name:'นางสาวสุกัญญา ชอบรัก'},{id:'K16',name:'นายขจรศักดิ์ วิวัฒน์วรรธนะ'},{id:'K17',name:'นางสาวรัชดาลัย ศิรินนท์'},{id:'K18',name:'นางสาวเกวลี จุลนาค'}
        ];

        let staffList = JSON.parse(localStorage.getItem('krt_staff_list')) || DEFAULT_STAFF;
        let attendance = JSON.parse(localStorage.getItem('krt_attendance_v5')) || [];
        let isAdmin = false;
        let myChart = null;

        function init() {
            lucide.createIcons();
            setInterval(updateClock, 1000);
            updateStaffDropdown();
            renderAttendance();
            renderManageStaff();
            updateDashboard();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').textContent = now.toLocaleTimeString('th-TH', {hour12:false});
            document.getElementById('live-date').textContent = now.toLocaleDateString('th-TH', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
        }

        function updateDashboard() {
            const today = new Date().toLocaleDateString('th-TH');
            const dailyData = attendance.filter(r => r.date === today);
            const total = staffList.length;
            const present = dailyData.filter(r => r.in !== '').length;
            const late = dailyData.filter(r => r.status === 'สาย').length;
            const absent = total - present;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-present').textContent = present;
            document.getElementById('stat-late').textContent = late;
            document.getElementById('stat-absent').textContent = absent;
            updateChart(present - late, late, absent);
        }

        function updateChart(normal, late, absent) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [normal || 0.1, late, absent],
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '75%', plugins: { legend: { display: false } } }
            });
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            
            // Update Active Nav (PC)
            document.getElementById('btn-nav-checkin-pc').className = (pageId === 'checkin') ? 'nav-active w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold' : 'w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-400 hover:bg-white/5 transition-all';
            document.getElementById('btn-nav-admin-pc').className = (pageId === 'admin') ? 'nav-active w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold' : 'w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-400 hover:bg-white/5 transition-all';
            
            // Update Active Nav (Mobile)
            document.getElementById('btn-nav-checkin-mob').className = (pageId === 'checkin') ? 'flex flex-col items-center gap-1 text-amber-500' : 'flex flex-col items-center gap-1 text-slate-400';
            document.getElementById('btn-nav-admin-mob').className = (pageId === 'admin') ? 'flex flex-col items-center gap-1 text-amber-500' : 'flex flex-col items-center gap-1 text-slate-400';
            
            document.getElementById('page-title').textContent = (pageId === 'admin') ? 'จัดการระบบ' : 'ลงเวลาปฏิบัติราชการ';
        }

        function handleCheckIn() {
            const id = document.getElementById('staff-select').value;
            const type = document.getElementById('checkin-type').value;
            if(!id) return alert('กรุณาเลือกชื่อ');
            const now = new Date();
            const date = now.toLocaleDateString('th-TH');
            const time = now.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit', hour12:false});
            let record = attendance.find(r => r.id === id && r.date === date);
            if(!record) {
                record = { id, name: staffList.find(s=>s.id===id).name, date, in: '', out: '', status: time > '08:30' ? 'สาย' : 'ปกติ' };
                attendance.push(record);
            }
            if(type === 'in') record.in = time; else record.out = time;
            localStorage.setItem('krt_attendance_v5', JSON.stringify(attendance));
            renderAttendance();
            updateDashboard();
            alert('บันทึกเรียบร้อย');
        }

        function renderAttendance() {
            const today = new Date().toLocaleDateString('th-TH');
            const daily = attendance.filter(r => r.date === today);
            document.getElementById('attendance-list').innerHTML = daily.map(r => `
                <tr class="hover:bg-white/5">
                    <td class="p-4"><div class="text-amber-500 font-bold">${r.id}</div><div class="text-white text-xs">${r.name}</div></td>
                    <td class="p-4 font-bold text-emerald-400">${r.in || '-'}</td>
                    <td class="p-4 font-bold text-slate-400">${r.out || '-'}</td>
                    <td class="p-4 text-center"><span class="px-2 py-0.5 rounded text-[8px] font-black uppercase ${r.status==='สาย'?'bg-rose-500 text-white':'bg-emerald-500 text-white'}">${r.status}</span></td>
                </tr>
            `).join('');
        }

        // Functions อื่นๆ (Admin login, Manage staff, Export) คงเดิมจาก Logic ของคุณ
        function checkAdmin() { if (isAdmin) showPage('admin'); else document.getElementById('login-modal').style.display = 'flex'; }
        function tryLogin() {
            if(document.getElementById('admin-pass').value === 'admin1234') {
                isAdmin = true; closeModal(); showPage('admin');
                document.getElementById('logout-btn-pc').classList.remove('hidden');
            } else { alert('รหัสผ่านไม่ถูกต้อง'); }
        }
        function closeModal() { document.getElementById('login-modal').style.display = 'none'; document.getElementById('admin-pass').value = ''; }
        function adminLogout() { isAdmin = false; document.getElementById('logout-btn-pc').classList.add('hidden'); showPage('checkin'); }

        function updateStaffDropdown() {
            const select = document.getElementById('staff-select');
            select.innerHTML = '<option value="" disabled selected>แตะเพื่อเลือกรายชื่อ...</option>' + 
                staffList.map(s => `<option value="${s.id}">${s.id} - ${s.name}</option>`).join('');
        }

        function renderManageStaff() {
            document.getElementById('manage-staff-list').innerHTML = staffList.map(s => `
                <tr class="hover:bg-white/5">
                    <td class="p-4 text-amber-500 font-bold">${s.id}</td>
                    <td class="p-4 text-white font-bold">${s.name}</td>
                    <td class="p-4 text-right"><button onclick="deleteStaff('${s.id}')" class="text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function addStaff() {
            const id = document.getElementById('new-id').value.trim();
            const name = document.getElementById('new-name').value.trim();
            if(!id || !name) return alert('กรอกไม่ครบ');
            staffList.push({id, name});
            localStorage.setItem('krt_staff_list', JSON.stringify(staffList));
            updateStaffDropdown(); renderManageStaff(); updateDashboard();
        }

        function deleteStaff(id) {
            if(confirm('ลบรายชื่อ?')) {
                staffList = staffList.filter(s => s.id !== id);
                localStorage.setItem('krt_staff_list', JSON.stringify(staffList));
                updateStaffDropdown(); renderManageStaff(); updateDashboard();
            }
        }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(attendance);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, "KRT_Report.xlsx");
        }

        function clearHistory() {
            if(confirm('ล้างข้อมูลทั้งหมด?')) {
                attendance = []; localStorage.setItem('krt_attendance_v5', JSON.stringify(attendance));
                renderAttendance(); updateDashboard();
            }
        }

        init();
    </script>
</body>
</html>
